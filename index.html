<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generador de Tablas — STEAMNOVA</title>
  <link rel="stylesheet" href="multiplicar.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <div class="page-wrapper">

    <header class="site-header">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>

      <div class="site-title">
        <span class="title-x3" id="display-factor">--</span>
        <span class="title-main">TABLA DINÁMICA</span>
        <span class="title-sub">SISTEMA_DE_APRENDIZAJE_STEAMNOVA</span>
      </div>

      <div class="user-guide">
        <p class="guide-text"><span class="cursor">></span> INGRESE EL NÚMERO QUE DESEA PRACTICAR:</p>
      </div>

      <div class="input-section">
        <div class="input-wrapper">
          <input type="number" id="numero-base" class="cyber-input" placeholder="00" min="1" max="99">
          <span class="input-hint">RANGO RECOMENDADO: 1 A 99</span>
        </div>
      </div>

      <button class="btn-probar" type="button" onclick="generarTablas()">
        GENERAR SECUENCIA [ENTER]
      </button>
    </header>

    <div class="stats-strip">
      <div class="stat-card stat-cyan">
        <span class="stat-label">INICIO</span>
        <span class="stat-value" id="stat-min">00</span>
      </div>
      <div class="stat-card stat-blue">
        <span class="stat-label">LÍMITE</span>
        <span class="stat-value" id="stat-max">00</span>
      </div>
      <div class="stat-card stat-pink">
        <span class="stat-label">FACTOR</span>
        <span class="stat-value" id="stat-factor">x0</span>
      </div>
    </div>

    <main class="main-content" id="tabla-container">
      <div class="system-message">
        <p>ESPERANDO ENTRADA DE DATOS PARA INICIALIZAR...</p>
      </div>
    </main>

    <footer class="site-footer">
      <span>&copy; VICTOR PILACHANGA | STEAMNOVA ACADEMY</span>
    </footer>
  </div>

  <script src="multiplicar.js"></script>
</body>
</html>
