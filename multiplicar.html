<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabla del 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="multiplicar.css" />
</head>
<body>

  <div class="page-wrapper">

    <header class="site-header">
      <div class="header-decoration"></div>
      <h1 class="site-title">
        <span class="title-x3">x3</span>
        <span class="title-main">Tabla del Tres</span>
      </h1>
      <button class="btn-probar" type="button">PROBAR</button>
    </header>

    <main class="main-content">
      <div class="table-card">

        <div class="table-row header-row">
          <span class="cell cell-factor">Factor</span>
          <span class="cell cell-op">Op.</span>
          <span class="cell cell-base">Base</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">Resultado</span>
        </div>

        <div class="table-row">
          <span class="cell cell-factor">1</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">3</span>
        </div>

        <div class="table-row">
          <span class="cell cell-factor">2</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">6</span>
        </div>

        <div class="table-row">
          <span class="cell cell-factor">3</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">9</span>
        </div>

        <div class="table-row">
          <span class="cell cell-factor">4</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">12</span>
        </div>

        <div class="table-row">
          <span class="cell cell-factor">5</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">15</span>
        </div>

        <div class="table-row">
          <span class="cell cell-factor">6</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">18</span>
        </div>

        <div class="table-row">
          <span class="cell cell-factor">7</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>

        </div>

        <div class="table-row">
          <span class="cell cell-factor">8</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">24</span>
        </div>

        <div class="table-row">
          <span class="cell cell-factor">9</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">27</span>
        </div>

        <div class="table-row row-last">
          <span class="cell cell-factor">10</span>
          <span class="cell cell-op">x</span>
          <span class="cell cell-base">3</span>
          <span class="cell cell-eq">=</span>
          <span class="cell cell-result">30</span>
        </div>

      </div>
    </main>

    <footer class="site-footer">
      <p>Matematicas Basicas &mdash; Tabla de Multiplicar</p>
    </footer>

  </div>

</body>
</html>
